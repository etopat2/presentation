                    <span><strong>Bilal Abubakar</strong> <span class="id">VU-BAD-2603-0214-DAY</span></span>
                    <span><strong>Salma Josephine</strong> <span class="id">VU-BBC-2503-0477-DAY</span></span>
                    <span><strong>Michelange Butu</strong> <span class="id">VU-BBC-2503-1859-DAY</span></span>
                    <span><strong>Najjemba Sarah Leon</strong> <span class="id">VU-BBC-2503-2377-DAY</span></span>

        // 2: AGENDA
        () => `

        () => `
            <div class="slide-title"><i class="fas fa-store" style="color:#3b82f6;"></i> Introduction & Business Scenario</div>

        // 4: DATASET OVERVIEW
        () => `

                <div style="display:grid; grid-template-columns:1fr 1fr; gap:1.2rem;">

        () => `

            <div class="slide-sub">Hypothesis Formulation</div>

                <table>
                    <tr><th>Hypothesis</th><th>Mathematical</th><th>Plain English</th></tr>
                    <tr><td><span class="badge">H₀</span></td><td>μ = 200</td><td>Average sales is <strong>$200</strong></td></tr>

                    <p>The alternative hypothesis states that the average sales per order are less than <strong>USD 200</strong>.</p>
                    <i class="fas fa-arrow-left" style="color:#3b82f6;"></i> <strong>One-tailed (left-tailed)</strong> — manager suspects lower sales only, not merely different from USD 200.

        () => `

                    <tr><td>Normality</td><td><span class="badge badge-orange">⚠️ Not normal</span></td><td>W = NaN, p = "", but <strong>n = 8,399</strong> robust</td></tr>

                    <i class="fas fa-lightbulb" style="color:#3b82f6;"></i> <strong>Central Limit Theorem:</strong> Large sample size makes t-test robust.
                </div>
                <div class="img-placeholder"><img src="images/sapiro-wilsk.png" Style="height:Auto; width:Auto"> <span style="font-weight:500;">Shapiro-Wilk output (p&lt;.001)</span></div>
            </div>
        `,

        // 7: PART A – RESULTS
        () => `
            <div class="slide-title"><i class="fas fa-table" style="color:#3b82f6;"></i> Part A: Results</div>
            <div class="slide-body">
                <table>
                    <tr><th>Statistic</th><th>Value</th></tr>
                    <tr><td>Sample size (n)</td><td>8,399</td></tr>
                    <tr><td>Mean Sales</td><td><strong>$1,775.88</strong></td></tr>
                    <tr><td>Std Deviation</td><td>$3,585.05</td></tr>
                    <tr><td>t-statistic</td><td>40.28</td></tr>
                    <tr><td>df</td><td>8,398</td></tr>
                    <tr><td>p-value (one-tailed)</td><td><span class="badge badge-red">1.000</span></td></tr>
                    <tr><td>95% CI</td><td>$1,499.20 – $1,652.56</td></tr>
                </table>

                <div class="text-muted" style="font-size:0.9rem;"><i class="fas fa-info-circle"></i> Mean is far above $200.</div>
            </div>
        `,

        // 8: PART A – INTERPRETATION
        () => `
            <div class="slide-title"><i class="fas fa-comment-dots" style="color:#3b82f6;"></i> Part A: Interpretation</div>
            <div class="slide-body">
                <div style="display:grid; grid-template-columns:1fr 1fr; gap:1rem;">
                    <div class="stat-card"><span class="label">t-statistic</span><div class="value" style="font-size:1.4rem;">40.28</div></div>
                    <div class="stat-card"><span class="label">p-value</span><div class="value" style="font-size:1.4rem;">1.000</div></div>
                </div>
                <div class="conclusion-box" style="border-left-color:#22c55e;">
                    <strong>Decision:</strong> Fail to reject H₀ &nbsp;|&nbsp; <span class="badge badge-green">✅ No evidence sales &lt; $200</span>

                <div style="background:#f8fafc; padding:0.8rem 1.2rem; border-radius:1rem;">
                    <i class="fas fa-bullhorn" style="color:#3b82f6;"></i> <strong>Recommendation:</strong> Don't lower sales expectations, but investigate high variability.
                </div>

        `,

        // 9: PART B – HYPOTHESIS
        () => `
            <div class="slide-title"><i class="fas fa-users-between-lines" style="color:#3b82f6;"></i> Part B: Independent t-Test</div>
            <div class="slide-sub">Consumer vs. Corporate Segments</div>
            <div class="slide-body">
                <p><strong>Research Question:</strong> Do Consumer and Corporate average sales differ?</p>
                <table>
                    <tr><th>Hypothesis</th><th>Mathematical</th><th>Plain English</th></tr>
                    <tr><td><span class="badge">H₀</span></td><td>μ<sub>Consumer</sub> = μ<sub>Corporate</sub></td><td>Equal average sales</td></tr>
                    <tr><td><span class="badge badge-red">H₁</span></td><td>μ<sub>Consumer</sub> ≠ μ<sub>Corporate</sub></td><td>Different average sales</td></tr>
                </table>
                <div style="background:#eef2ff; padding:0.6rem 1rem; border-radius:0.8rem;">
                    <i class="fas fa-arrows-left-right" style="color:#3b82f6;"></i> <strong>Two-tailed</strong> — no direction predicted.
                </div>
            </div>
        `,

        // 10: PART B – ASSUMPTIONS
        () => `
            <div class="slide-title"><i class="fas fa-check-double" style="color:#3b82f6;"></i> Part B: Assumption Checking</div>
            <div class="slide-body">
                <table>
                    <tr><th>Assumption</th><th>Result</th><th>Interpretation</th></tr>
                    <tr><td>Independence</td><td><span class="badge badge-green">✅ Satisfied</span></td><td>Different segments</td></tr>
                    <tr><td>Normality</td><td><span class="badge badge-orange">⚠️ Not normal</span></td><td>p &lt; .001, but large samples</td></tr>
                    <tr><td>Homogeneity (Levene)</td><td><span class="badge badge-green">✅ p = 0.585</span></td><td>Equal variances assumed</td></tr>
                </table>
                <div class="conclusion-box" style="border-left-color:#22c55e;">
                    <i class="fas fa-check-circle" style="color:#22c55e;"></i> Levene's test p = 0.585 &gt; 0.05 → equal variances.
                </div>
            </div>
        `,

        // 11: PART B – DESCRIPTIVES
        () => `
            <div class="slide-title"><i class="fas fa-chart-simple" style="color:#3b82f6;"></i> Part B: Descriptive Statistics</div>

                    <tr><td><strong>Consumer</strong></td><td>1,649</td><td>$1,857.86</td><td>$4,112.20</td></tr>

                <div class="img-placeholder"><img src="images/independent_sample_t-test.png" style="height:14rem;"/> JASP independent t-test output</div>
            </div>
        `,

        // 13: PART B – INTERPRETATION
        () => `
            <div class="slide-title"><i class="fas fa-comment-dots" style="color:#3b82f6;"></i> Part B: Interpretation</div>
            <div class="slide-body">
                <div style="display:grid; grid-template-columns:1fr 1fr; gap:1rem;">
                    <div class="stat-card"><span class="label">t-statistic</span><div class="value" style="font-size:1.4rem;">0.62</div></div>
                    <div class="stat-card"><span class="label">p-value</span><div class="value" style="font-size:1.4rem;">0.539</div></div>
                </div>
                <div class="conclusion-box" style="border-left-color:#22c55e;">
                    <strong>Decision:</strong> Fail to reject H₀ &nbsp;|&nbsp; <span class="badge badge-green">✅ No significant difference</span>
                </div>
                <p><strong>Business:</strong> Consumer ($1,857.86) vs Corporate ($1,787.68) — difference of $70.18 is <strong>not significant</strong> (p = 0.539).</p>
                <div style="background:#f8fafc; padding:0.8rem 1.2rem; border-radius:1rem;">
                    <i class="fas fa-bullhorn" style="color:#3b82f6;"></i> <strong>Recommendation:</strong> Don't base marketing decisions solely on segment identity. Consider additional variables.
                </div>
            </div>
        `,

        // 14: PART C – HYPOTHESIS
        () => `
            <div class="slide-title"><i class="fas fa-tags" style="color:#3b82f6;"></i> Part C: Paired t-Test</div>
            <div class="slide-sub">Sales Before vs. After Discount Campaign</div>
            <div class="slide-body">
                <p><strong>Research Question:</strong> Did sales <strong>increase</strong> after discount campaign?</p>
                <table>
                    <tr><th>Hypothesis</th><th>Mathematical</th><th>Plain English</th></tr>
                    <tr><td><span class="badge">H₀</span></td><td>μ<sub>diff</sub> = 0</td><td>No increase in sales</td></tr>
                    <tr><td><span class="badge badge-red">H₁</span></td><td>μ<sub>diff</sub> &gt; 0</td><td>Sales <strong>increased</strong></td></tr>
                </table>
                <div style="background:#eef2ff; padding:0.6rem 1rem; border-radius:0.8rem;">
                    <i class="fas fa-arrow-right" style="color:#3b82f6;"></i> <strong>One-tailed (right-tailed)</strong> — specific increase question.
                </div>
            </div>
        `,

        // 15: PART C – DIFFERENCE VARIABLE
        () => `
            <div class="slide-title"><i class="fas fa-arrows-spin" style="color:#3b82f6;"></i> Part C: Difference Variable</div>
            <div class="slide-body">
                <p><code>Difference = Mean Sales (Discount &gt; 0) – Mean Sales (Discount = 0)</code></p>
                <table>
                    <tr><th>Category</th><th>No Discount</th><th>Discount &gt; 0</th><th>Difference</th></tr>
                    <tr><td>Furniture</td><td>$2,915.69</td><td>$3,012.78</td><td><span class="badge badge-green">+$97.08</span></td></tr>
                    <tr><td>Office Supplies</td><td>$827.69</td><td>$812.81</td><td><span class="badge badge-red">-$14.88</span></td></tr>
                    <tr><td>Technology</td><td>$3,356.10</td><td>$2,845.52</td><td><span class="badge badge-red">-$510.58</span></td></tr>
                </table>
                <div class="img-placeholder"><img src="images/diff_variables_creation.png" style="height:14rem;"/> JASP difference variable creation</div>
            </div>
        `,

        // 16: PART C – ASSUMPTIONS
        () => `
            <div class="slide-title"><i class="fas fa-check-double" style="color:#3b82f6;"></i> Part C: Assumption Checking</div>
            <div class="slide-body">
                <table>
                    <tr><th>Assumption</th><th>Result</th><th>Interpretation</th></tr>
                    <tr><td>Paired observations</td><td><span class="badge badge-green">✅ Satisfied</span></td><td>Same categories compared</td></tr>
                    <tr><td>Continuous difference</td><td><span class="badge badge-green">✅ Satisfied</span></td><td>Sales in USD</td></tr>
                    <tr><td>Normality of differences</td><td><span class="badge badge-green">✅ p = 0.332</span></td><td>Shapiro-Wilk W = 0.883, p = 0.332</td></tr>
                </table>
                <div class="conclusion-box" style="border-left-color:#22c55e;">
                    <i class="fas fa-check-circle" style="color:#22c55e;"></i> Normality <strong>not rejected</strong> (p = 0.332).
                </div>
                <div class="img-placeholder"><img src="images/assumption.png" style="height:14rem;"/> Shapiro-Wilk output for differences</div>
            </div>
        `,

        // 17: PART C – RESULTS
        () => `
            <div class="slide-title"><i class="fas fa-table" style="color:#3b82f6;"></i> Part C: Results</div>
            <div class="slide-body">
                <table>
                    <tr><th>Statistic</th><th>Value</th></tr>
                    <tr><td>Paired categories</td><td>3</td></tr>
                    <tr><td>Mean difference</td><td><strong>-$142.79</strong></td></tr>
                    <tr><td>Std deviation</td><td>$323.39</td></tr>
                    <tr><td>t-statistic</td><td>-0.765</td></tr>
                    <tr><td>df</td><td>2</td></tr>
                    <tr><td>p-value (one-tailed)</td><td><span class="badge badge-orange">0.738</span></td></tr>
                    <tr><td>95% CI</td><td>-$946.16 to $660.58</td></tr>
                </table>
                <div class="img-placeholder"><img src="images/paired_t-test.png" style="height:14rem;"/> JASP paired t-test output</div>
            </div>
        `,

        // 18: PART C – INTERPRETATION
        () => `
            <div class="slide-title"><i class="fas fa-comment-dots" style="color:#3b82f6;"></i> Part C: Interpretation</div>
            <div class="slide-body">
                <div style="display:grid; grid-template-columns:1fr 1fr; gap:1rem;">
                    <div class="stat-card"><span class="label">t-statistic</span><div class="value" style="font-size:1.4rem;">-0.765</div></div>
                    <div class="stat-card"><span class="label">p-value</span><div class="value" style="font-size:1.4rem;">0.738</div></div>
                </div>
                <div class="conclusion-box" style="border-left-color:#22c55e;">
                    <strong>Decision:</strong> Fail to reject H₀ &nbsp;|&nbsp; <span class="badge badge-green">✅ No evidence of increase</span>
                </div>
                <p><strong>Business:</strong> Mean difference is <strong>negative</strong> (-$142.79), but not significant. Discount campaign <strong>did not</strong> significantly increase sales at category level.</p>
                <div style="background:#f8fafc; padding:0.8rem 1.2rem; border-radius:1rem;">
                    <i class="fas fa-bullhorn" style="color:#3b82f6;"></i> <strong>Recommendation:</strong> Review discount strategy; investigate if discounts are applied to low-performing products or reducing profit.
                </div>
            </div>
        `,

        // 19: OVERALL CONCLUSIONS
        () => `
            <div class="slide-title"><i class="fas fa-flag-checkered" style="color:#3b82f6;"></i> Overall Conclusions</div>
            <div class="slide-body">
                <table>
                    <tr><th>Part</th><th>Analysis</th><th>Result</th><th>Business Implication</th></tr>
                    <tr><td><span class="badge">A</span></td><td>One-Sample t-Test</td><td><span class="badge badge-green">❌ Not Supported</span></td><td>Sales <strong>not</strong> below $200; much higher</td></tr>
                    <tr><td><span class="badge">B</span></td><td>Independent t-Test</td><td><span class="badge badge-green">❌ Not Supported</span></td><td><strong>No difference</strong> Consumer vs Corporate</td></tr>
                    <tr><td><span class="badge">C</span></td><td>Paired t-Test</td><td><span class="badge badge-green">❌ Not Supported</span></td><td>Discount campaign <strong>not</strong> significantly effective</td></tr>

                <div class="conclusion-box" style="border-left-color:#8b5cf6;">
                    <i class="fas fa-gavel" style="color:#8b5cf6;"></i> <strong>Key Takeaway:</strong> At the 5% significance level, <strong>none</strong> of the manager's suspicions were supported.
                </div>
            </div>
        `,

        // 20: RECOMMENDATIONS
        () => `
            <div class="slide-title"><i class="fas fa-lightbulb" style="color:#f59e0b;"></i> Recommendations</div>

    // -------- NAVIGATION --------
    let currentSlide = 0;
    const total = slides.length;

    const content = document.getElementById('slideContent');
    const counter = document.getElementById('slideCounter');
    const prevBtn = document.getElementById('prevBtn');
    const nextBtn = document.getElementById('nextBtn');

    function renderSlide(index) {
        content.innerHTML = slides[index]();
        counter.textContent = `${index + 1} / ${total}`;
        prevBtn.disabled = index === 0;
        nextBtn.disabled = index === total - 1;
        // re-trigger animation
        content.style.animation = 'none';
        requestAnimationFrame(() => {
            content.style.animation = 'fadeSlide 0.25s ease';
        });
    }

    prevBtn.addEventListener('click', () => {
        if (currentSlide > 0) {
            currentSlide--;
            renderSlide(currentSlide);
        }
    });

    nextBtn.addEventListener('click', () => {
        if (currentSlide < total - 1) {
            currentSlide++;
            renderSlide(currentSlide);
        }
    });

    // keyboard support
    document.addEventListener('keydown', (e) => {
        if (e.key === 'ArrowRight' || e.key === 'ArrowDown') {
            e.preventDefault();
            if (currentSlide < total - 1) {
                currentSlide++;
                renderSlide(currentSlide);
            }
        } else if (e.key === 'ArrowLeft' || e.key === 'ArrowUp') {
            e.preventDefault();
            if (currentSlide > 0) {
                currentSlide--;
                renderSlide(currentSlide);
            }
        }
    });

    // initial render
    renderSlide(0);
</script>
